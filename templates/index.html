<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Fraud Detection</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; margin-top: 20px; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .result { margin-top: 30px; padding: 15px; border-radius: 5px; text-align: center; }
        .fraud { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .legit { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .confidence { font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Insurance Claim Fraud Detection</h1>
    <form method="POST" action="/predict">
        <label>Claim Amount ($):</label>
        <input type="number" step="0.01" name="claim_amount" required>

        <label>Incident Hour (0-23):</label>
        <input type="number" min="0" max="23" name="incident_hour" required>

        <label>Incident Severity (1-5):</label>
        <select name="incident_severity" required>
            <option value="1">1 - Minor</option><option value="2">2 - Moderate</option>
            <option value="3">3 - Serious</option><option value="4">4 - Severe</option>
            <option value="5">5 - Critical</option>
        </select>

        <label>Number of Vehicles Involved:</label>
        <input type="number" min="1" max="5" name="num_vehicles" required>

        <label>Age of Policyholder:</label>
        <input type="number" min="18" max="100" name="age_policyholder" required>

        <label>Prior Claims (count):</label>
        <input type="number" min="0" max="10" name="prior_claims" required>

        <button type="submit">Predict Fraud</button>
    </form>

    {% if prediction %}
    <div class="result {{ 'fraud' if prediction.fraud else 'legit' }}">
        <h3>{{ prediction.message }}</h3>
        <p><strong>Confidence Score:</strong> {{ prediction.confidence }}</p>
        <p><strong>Assigned Cluster:</strong> {{ prediction.cluster }}</p>
    </div>
    {% endif %}

    {% if error %}
    <div class="result error">
        <p><strong>Error:</strong> {{ error }}</p>
    </div>
    {% endif %}
</div>
</body>
</html>
